  glob: ^13.0.6
  jsdom: ^29.1.1
  postcss: ^8.5.15
  prettier: ^3.8.4
  rimraf: ^6.1.3
  rollup: ^4.62.0
  rollup-plugin-esbuild: ^6.2.1
  rollup-plugin-postcss: ^4.0.2
  stylelint: ^17.13.0
  tsdown: ^0.22.2
  tsx: ^4.22.4
