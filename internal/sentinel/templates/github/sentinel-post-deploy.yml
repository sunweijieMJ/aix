# Phase 2: 部署后冒烟测试失败自动修复
# 部署完成后触发，运行冒烟测试，并自动修复失败项

name: Sentinel - Post Deploy

on:
  deployment_status:
  workflow_run:
    workflows: ['__DEPLOY_WORKFLOW__']
    types: [completed]
  workflow_dispatch:
    inputs:
      deploy_url:
        description: '待测试的部署 URL'
        required: false
        type: string

# 部署后修复不允许并发执行
concurrency:
  group: sentinel-post-deploy
  cancel-in-progress: true

jobs:
  smoke-test-and-fix:
    if: >-
      vars.SENTINEL_ENABLED != 'false' &&
      ((github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'deployment_status' && github.event.deployment_status.state == 'success') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'))
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    env:
      BRANCH_NAME: sentinel/post-deploy-${{ github.run_id }}
      DEPLOY_URL: ${{ github.event.inputs.deploy_url || github.event.deployment_status.target_url || '' }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

__PACKAGE_MANAGER_SETUP__

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: __NODE_VERSION__
          cache: __PACKAGE_MANAGER__

      - name: 安装依赖
        run: __INSTALL_CMD__

      - name: 检查部署 URL
        id: check_url
        run: |
          if [ -z "$DEPLOY_URL" ]; then
            echo "::warning::DEPLOY_URL 为空，跳过冒烟测试"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 安装 Playwright 浏览器
        if: steps.check_url.outputs.skip != 'true'
        run: __EXEC_CMD__ playwright install --with-deps chromium

      - name: 执行冒烟测试
        if: steps.check_url.outputs.skip != 'true'
        id: smoke_tests
        continue-on-error: true
        env:
          BASE_URL: ${{ env.DEPLOY_URL }}
        run: |
          # 执行冒烟测试并捕获输出
          set +e
          SMOKE_OUTPUT=$(__SMOKE_TEST_CMD__ 2>&1)
          SMOKE_EXIT_CODE=$?
          set -e

          echo "$SMOKE_OUTPUT"

          if [ $SMOKE_EXIT_CODE -ne 0 ]; then
            echo "smoke_failed=true" >> "$GITHUB_OUTPUT"
            # 保存失败输出供 Claude 分析
            echo "$SMOKE_OUTPUT" > /tmp/smoke-test-output.txt
          else
            echo "smoke_failed=false" >> "$GITHUB_OUTPUT"
            echo "所有冒烟测试通过！"
          fi

      - name: 冒烟测试通过，跳过修复
        if: steps.check_url.outputs.skip != 'true' && steps.smoke_tests.outputs.smoke_failed != 'true'
        run: echo "冒烟测试通过，无需修复。"

      - name: 准备上下文信息
        if: steps.check_url.outputs.skip != 'true' && steps.smoke_tests.outputs.smoke_failed == 'true'
        id: context
        run: |
          # 收集失败上下文
          SMOKE_OUTPUT=$(cat /tmp/smoke-test-output.txt)

          # 超过 5000 字符时截断
          if [ ${#SMOKE_OUTPUT} -gt 5000 ]; then
            SMOKE_OUTPUT="${SMOKE_OUTPUT:0:5000}... [已截断]"
          fi

          # 将上下文写入文件，供提示词使用
          cat > /tmp/fix-context.md << 'CONTEXT_EOF'
          ## 部署后冒烟测试失败

          以下冒烟测试在部署后失败：

          ```
          CONTEXT_EOF
          echo "$SMOKE_OUTPUT" >> /tmp/fix-context.md
          echo '```' >> /tmp/fix-context.md

          # 将上下文写入 step output，供后续步骤使用
          {
            echo "prompt_context<<CONTEXT_EOF"
            cat /tmp/fix-context.md
            echo "CONTEXT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: 创建修复分支
        if: steps.check_url.outputs.skip != 'true' && steps.smoke_tests.outputs.smoke_failed == 'true'
        run: git checkout -b "$BRANCH_NAME"

      - name: 执行 Claude Code
        if: steps.check_url.outputs.skip != 'true' && steps.smoke_tests.outputs.smoke_failed == 'true'
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            部署后冒烟测试失败，以下是测试输出：

            ${{ steps.context.outputs.prompt_context }}

            修复要求：
            1. 仔细分析冒烟测试失败原因
            2. 定位源代码中的根本原因
            3. 实现最小化修复
            4. 运行类型检查验证：__RUN_CMD__ type-check
            5. 运行 Lint 验证：__RUN_CMD__ lint
            6. 只允许修改以下目录：__ALLOWED_PATHS_DISPLAY__
            7. 禁止修改测试文件、配置文件或 package.json
            8. 这是部署后修复，务必优先保证正确性和安全性
            9. 提交信息格式：fix: post-deploy smoke test failure
          claude_args: '--model __MODEL__ --max-turns __MAX_TURNS__ --allowedTools "Edit,Write,Read,Glob,Grep"'
          settings: |
            {
              "enabledMcpjsonServers": [],
              "hooks": {}
            }

      - name: 验证 - 类型检查
        if: steps.check_url.outputs.skip != 'true' && steps.smoke_tests.outputs.smoke_failed == 'true'
        run: __RUN_CMD__ type-check

      - name: 验证 - Lint 检查
        if: steps.check_url.outputs.skip != 'true' && steps.smoke_tests.outputs.smoke_failed == 'true'
        run: __RUN_CMD__ lint

      - name: 校验修改文件
        if: steps.check_url.outputs.skip != 'true' && steps.smoke_tests.outputs.smoke_failed == 'true'
        id: validate
        run: |
          CHANGED_FILES=$(git diff origin/__DEFAULT_BRANCH__ HEAD --name-only)

          if [ -z "$CHANGED_FILES" ]; then
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "已修改文件："
          echo "$CHANGED_FILES"

          # 校验修改文件是否在白名单目录内（__ALLOWED_PATHS_DISPLAY__）
          INVALID_FILES=""
          while IFS= read -r file; do
            if [[ ! "$file" =~ __ALLOWED_PATHS_REGEX__ ]]; then
              INVALID_FILES="$INVALID_FILES\n$file"
            fi
          done <<< "$CHANGED_FILES"

          if [ -n "$INVALID_FILES" ]; then
            echo "::error::以下文件不在允许修改的目录内：$INVALID_FILES"
            echo "invalid_files=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "no_changes=false" >> "$GITHUB_OUTPUT"

      - name: 推送分支
        if: >-
          steps.check_url.outputs.skip != 'true' &&
          steps.smoke_tests.outputs.smoke_failed == 'true' &&
          steps.validate.outputs.no_changes != 'true'
        env:
          SENTINEL_PAT: ${{ secrets.SENTINEL_PAT }}
        run: git push "https://x-access-token:${SENTINEL_PAT}@github.com/${{ github.repository }}" "$BRANCH_NAME"

      - name: 清理无效分支
        if: always() && steps.validate.outputs.invalid_files == 'true'
        run: |
          git push origin --delete "$BRANCH_NAME" 2>/dev/null || true
          echo "::notice::已清理包含非法修改的远端分支：$BRANCH_NAME"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 创建 PR
        id: create_pr
        if: >-
          steps.check_url.outputs.skip != 'true' &&
          steps.smoke_tests.outputs.smoke_failed == 'true' &&
          steps.validate.outputs.no_changes != 'true'
        run: |
          {
            echo "## 部署后 Sentinel"
            echo ""
            echo "### 触发原因"
            echo "部署后冒烟测试失败。"
            echo ""
            echo "### 改动说明"
            echo "本 PR 由 AI Sentinel 自动生成，用于修复部署后冒烟测试失败。"
            echo ""
            echo "### 验证结果"
            echo "- [x] TypeScript 类型检查通过"
            echo "- [x] Lint 检查通过"
            echo "- [x] 仅修改了允许的目录（__ALLOWED_PATHS_DISPLAY__）"
            echo ""
            echo "### 审查清单"
            echo "- [ ] 改动正确且最小化"
            echo "- [ ] 无意外副作用"
            echo "- [ ] 此修复可通过冒烟测试"
            echo "- [ ] 其他测试无回归"
            echo ""
            echo "---"
            echo "🤖 由 AI Sentinel（部署后）自动生成"
          } > /tmp/pr-body.md

          PR_URL=$(gh pr create \
            --head "$BRANCH_NAME" \
            --base "__DEFAULT_BRANCH__" \
            --title "fix: post-deploy smoke test failure" \
            --body-file /tmp/pr-body.md \
            --label "sentinel,post-deploy,urgent" \
            __REVIEWER_FLAG__)

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 无法自动修复时创建紧急 Issue
        if: >-
          steps.check_url.outputs.skip != 'true' &&
          steps.smoke_tests.outputs.smoke_failed == 'true' &&
          (steps.validate.outputs.no_changes == 'true' ||
          (failure() && steps.validate.outputs.invalid_files != 'true'))
        run: |
          gh issue create \
            --title "🚨 部署后冒烟测试失败 - 需要人工修复" \
            --body "## 部署后失败

          部署后冒烟测试失败，且自动修复未能解决问题。

          ### 需要人工处理
          请人工排查并修复。

          ### Workflow 运行详情
          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ---
          🤖 由 AI Sentinel 自动创建" \
            --label "bug,urgent"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
