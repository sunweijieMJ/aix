# Phase 1: Issue 触发式 AI Sentinel
# 触发方式: 给 Issue 打上 sentinel 标签
# Claude Code 将分析 Issue 并自动创建修复 PR

name: Sentinel - Issue

on:
  issues:
    types: [labeled]

# 同一 Issue 不允许并发执行
concurrency:
  group: sentinel-issue-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  sentinel:
    if: >-
      github.event.label.name == 'sentinel' &&
      vars.SENTINEL_ENABLED != 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    env:
      BRANCH_NAME: sentinel/issue-${{ github.event.issue.number }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      ISSUE_TITLE: ${{ github.event.issue.title }}
      ISSUE_BODY: ${{ github.event.issue.body }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

__PACKAGE_MANAGER_SETUP__

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: __NODE_VERSION__
          cache: __PACKAGE_MANAGER__

      - name: 安装依赖
        run: __INSTALL_CMD__

      - name: 检查每日 PR 数量限制
        id: pr_limit
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          PR_COUNT=$(gh pr list \
            --label "sentinel" \
            --state all \
            --search "created:>=$TODAY" \
            --json number \
            --jq 'length')

          echo "今日 sentinel PR 数量: $PR_COUNT"

          if [ "$PR_COUNT" -ge __PR_DAILY_LIMIT__ ]; then
            echo "::warning::今日 PR 数量已达上限（__PR_DAILY_LIMIT__），跳过本次执行"
            echo "limit_reached=true" >> "$GITHUB_OUTPUT"
          else
            echo "limit_reached=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 评论 - 开始修复
        if: steps.pr_limit.outputs.limit_reached != 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            🤖 **Sentinel 已启动**

            Claude Code 正在分析此 Issue 并尝试自动修复。
            若修复成功，将自动创建 PR。

            ---
            _由 `sentinel` 标签触发_

      - name: 评论 - 已达每日上限
        if: steps.pr_limit.outputs.limit_reached == 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            ⚠️ **Sentinel 已跳过**

            今日 PR 数量已达上限（__PR_DAILY_LIMIT__），请明日再试或手动修复。

      - name: 创建修复分支
        if: steps.pr_limit.outputs.limit_reached != 'true'
        run: |
          git push origin --delete "$BRANCH_NAME" 2>/dev/null || true
          git checkout -b "$BRANCH_NAME"

      - name: 执行 Claude Code
        if: steps.pr_limit.outputs.limit_reached != 'true'
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            你正在修复 Issue #${{ github.event.issue.number }} 中报告的 Bug。

            Issue 标题：${{ github.event.issue.title }}
            Issue 内容：
            ${{ github.event.issue.body }}

            修复要求：
            1. 仔细分析 Issue 描述，理解问题所在
            2. 找到相关源文件
            3. 实现最小化修复
            4. 运行类型检查验证：__RUN_CMD__ type-check
            5. 运行 Lint 验证：__RUN_CMD__ lint
            6. 只允许修改以下目录：__ALLOWED_PATHS_DISPLAY__
            7. 禁止修改测试文件、配置文件或 package.json
            8. 提交信息格式：fix: sentinel for #${{ github.event.issue.number }}
          claude_args: '--model __MODEL__ --max-turns __MAX_TURNS__ --allowedTools "Edit,Write,Read,Glob,Grep"'
          settings: |
            {
              "enabledMcpjsonServers": [],
              "hooks": {}
            }

      - name: 验证 - 类型检查
        if: steps.pr_limit.outputs.limit_reached != 'true'
        run: __RUN_CMD__ type-check

      - name: 验证 - Lint 检查
        if: steps.pr_limit.outputs.limit_reached != 'true'
        run: __RUN_CMD__ lint

      - name: 校验修改文件
        if: steps.pr_limit.outputs.limit_reached != 'true'
        id: validate
        run: |
          CHANGED_FILES=$(git diff origin/__DEFAULT_BRANCH__ HEAD --name-only)

          if [ -z "$CHANGED_FILES" ]; then
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "已修改文件："
          echo "$CHANGED_FILES"

          # 校验修改文件是否在白名单目录内（__ALLOWED_PATHS_DISPLAY__）
          INVALID_FILES=""
          while IFS= read -r file; do
            if [[ ! "$file" =~ __ALLOWED_PATHS_REGEX__ ]]; then
              INVALID_FILES="$INVALID_FILES\n$file"
            fi
          done <<< "$CHANGED_FILES"

          if [ -n "$INVALID_FILES" ]; then
            echo "::error::以下文件不在允许修改的目录内：$INVALID_FILES"
            echo "invalid_files=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "no_changes=false" >> "$GITHUB_OUTPUT"

      - name: 推送分支
        if: >-
          steps.pr_limit.outputs.limit_reached != 'true' &&
          steps.validate.outputs.no_changes != 'true'
        env:
          SENTINEL_PAT: ${{ secrets.SENTINEL_PAT }}
        run: git push "https://x-access-token:${SENTINEL_PAT}@github.com/${{ github.repository }}" "$BRANCH_NAME"

      - name: 创建 PR
        id: create_pr
        if: >-
          steps.pr_limit.outputs.limit_reached != 'true' &&
          steps.validate.outputs.no_changes != 'true'
        run: |
          {
            echo "## Sentinel for #${ISSUE_NUMBER}"
            echo ""
            echo "### 关联 Issue"
            echo "Closes #${ISSUE_NUMBER}"
            echo ""
            echo "### 改动说明"
            echo "本 PR 由 AI Sentinel 自动生成，用于修复上述 Issue 中报告的问题。"
            echo ""
            echo "### 验证结果"
            echo "- [x] TypeScript 类型检查通过"
            echo "- [x] Lint 检查通过"
            echo "- [x] 仅修改了允许的目录（__ALLOWED_PATHS_DISPLAY__）"
            echo ""
            echo "### 审查清单"
            echo "- [ ] 改动正确且最小化"
            echo "- [ ] 无意外副作用"
            echo "- [ ] 本地测试通过"
            echo ""
            echo "---"
            echo "🤖 由 AI Sentinel 自动生成"
          } > /tmp/pr-body.md

          PR_URL=$(gh pr create \
            --head "$BRANCH_NAME" \
            --base "__DEFAULT_BRANCH__" \
            --title "fix: sentinel for #${ISSUE_NUMBER}" \
            --body-file /tmp/pr-body.md \
            --label "sentinel" \
            __REVIEWER_FLAG__)

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 清理无效分支
        if: always() && steps.validate.outputs.invalid_files == 'true'
        run: |
          git push origin --delete "$BRANCH_NAME" 2>/dev/null || true
          echo "::notice::已清理包含非法修改的远端分支：$BRANCH_NAME"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 评论 - PR 已创建
        if: steps.create_pr.outputs.pr_url
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            ✅ **Sentinel 修复完成**

            已创建修复 PR：${{ steps.create_pr.outputs.pr_url }}

            请审查后合并。

      - name: 评论 - 无修改
        if: >-
          steps.pr_limit.outputs.limit_reached != 'true' &&
          steps.validate.outputs.no_changes == 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            ℹ️ **Sentinel - 未生成修改**

            Claude Code 已分析此 Issue，但无法确定自动化修复方案，建议人工排查。

      - name: 评论 - 执行失败
        if: failure()
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            ❌ **Sentinel 执行失败**

            自动修复过程中发生错误，请查看 [workflow 运行详情](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})。
