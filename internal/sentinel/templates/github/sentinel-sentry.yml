# Phase 3: Sentry 错误自动修复
# 触发方式：Sentry webhook 通过 Cloudflare Worker 发送 repository_dispatch 事件
# Claude Code 将分析 Sentry 错误并自动创建修复 PR

name: Sentinel - Sentry

on:
  repository_dispatch:
    types: [sentry-issue]

# 同一 Sentry issue 不允许并发执行
concurrency:
  group: sentinel-sentry-${{ github.event.client_payload.safe_key || github.run_id }}
  cancel-in-progress: false

jobs:
  sentinel:
    if: vars.SENTINEL_ENABLED != 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    env:
      SENTRY_TITLE: ${{ github.event.client_payload.title }}
      SENTRY_CULPRIT: ${{ github.event.client_payload.culprit }}
      SENTRY_STACKTRACE: ${{ github.event.client_payload.stacktrace }}
      SENTRY_URL: ${{ github.event.client_payload.url }}
      SENTRY_LEVEL: ${{ github.event.client_payload.level }}
      SENTRY_EVENT_ID: ${{ github.event.client_payload.event_id }}
      SAFE_KEY: ${{ github.event.client_payload.safe_key }}
      BRANCH_NAME: sentinel/sentry-${{ github.event.client_payload.safe_key || github.run_id }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

__PACKAGE_MANAGER_SETUP__

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: __NODE_VERSION__
          cache: __PACKAGE_MANAGER__

      - name: 安装依赖
        run: __INSTALL_CMD__

      - name: 检查每日 PR 数量限制
        id: pr_limit
        run: |
          # 统计今日已创建的 sentinel sentry PR 数量
          TODAY=$(date -u +%Y-%m-%d)
          PR_COUNT=$(gh pr list \
            --label "sentinel,sentry" \
            --state all \
            --search "created:>=$TODAY" \
            --json number \
            --jq 'length')

          echo "今日 sentinel sentry PR 数量: $PR_COUNT"

          if [ "$PR_COUNT" -ge __PR_DAILY_LIMIT__ ]; then
            echo "::warning::今日 PR 数量已达上限（__PR_DAILY_LIMIT__），跳过本次执行"
            echo "limit_reached=true" >> "$GITHUB_OUTPUT"
          else
            echo "limit_reached=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 检查是否存在重复 PR
        id: dup_check
        if: steps.pr_limit.outputs.limit_reached != 'true'
        run: |
          # 检查此 Sentry issue 是否已有对应的开启中 PR
          EXISTING_PR=$(gh pr list \
            --head "sentinel/sentry-${SAFE_KEY}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$EXISTING_PR" ]; then
            echo "::notice::PR #$EXISTING_PR 已存在，跳过重复创建"
            echo "duplicate=true" >> "$GITHUB_OUTPUT"
          else
            echo "duplicate=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 评估前置检查结果
        id: precheck
        env:
          LIMIT_REACHED: ${{ steps.pr_limit.outputs.limit_reached }}
          DUPLICATE: ${{ steps.dup_check.outputs.duplicate }}
        run: |
          if [ "$LIMIT_REACHED" == "true" ] || \
             [ "$DUPLICATE" == "true" ]; then
            echo "should_proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_proceed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 准备上下文信息
        id: context
        if: steps.precheck.outputs.should_proceed == 'true'
        run: |
          echo "## Sentry 错误报告" > /tmp/sentry-context.md
          echo "" >> /tmp/sentry-context.md
          echo "**标题:** ${SENTRY_TITLE}" >> /tmp/sentry-context.md
          echo "**级别:** ${SENTRY_LEVEL}" >> /tmp/sentry-context.md
          echo "**触发位置:** ${SENTRY_CULPRIT}" >> /tmp/sentry-context.md
          echo "**Sentry 链接:** ${SENTRY_URL}" >> /tmp/sentry-context.md
          echo "" >> /tmp/sentry-context.md
          echo "### 堆栈信息" >> /tmp/sentry-context.md
          echo '```' >> /tmp/sentry-context.md
          echo "${SENTRY_STACKTRACE}" >> /tmp/sentry-context.md
          echo '```' >> /tmp/sentry-context.md

          # 将上下文写入 step output，供后续步骤使用
          {
            echo "prompt_context<<CONTEXT_EOF"
            cat /tmp/sentry-context.md
            echo "CONTEXT_EOF"
          } >> "$GITHUB_OUTPUT"

          echo "上下文准备完成。"

      - name: 创建修复分支
        if: steps.precheck.outputs.should_proceed == 'true'
        run: |
          git push origin --delete "$BRANCH_NAME" 2>/dev/null || true
          git checkout -b "$BRANCH_NAME"

      - name: 执行 Claude Code
        id: claude
        if: steps.precheck.outputs.should_proceed == 'true'
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            生产环境发生了一个 Sentry 错误，请分析并修复。

            ${{ steps.context.outputs.prompt_context }}

            修复要求：
            1. 分析堆栈信息，定位根本原因
            2. 在代码库中找到相关源文件
            3. 实现最小化修复
            4. 只允许修改以下目录：__ALLOWED_PATHS_DISPLAY__
            5. 禁止修改测试文件、配置文件或 package.json
            6. 在修改处附近添加简短注释，说明修复原因
            7. 修复完成后无需运行验证命令，workflow 会自动执行类型检查和 Lint 验证
          claude_args: '--model __MODEL__ --max-turns __MAX_TURNS__ --allowedTools "Edit,Write,Read,Glob,Grep"'
          settings: |
            {
              "enabledMcpjsonServers": [],
              "hooks": {}
            }

      - name: 提交 Claude 修改
        if: steps.precheck.outputs.should_proceed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add __ALLOWED_PATHS_GIT_ADD__
          git diff --cached --quiet && exit 0
          git commit -m "fix: sentinel sentry error - ${SAFE_KEY}"

      - name: 验证 - 类型检查
        if: steps.precheck.outputs.should_proceed == 'true'
        run: __RUN_CMD__ type-check

      - name: 验证 - Lint 检查
        if: steps.precheck.outputs.should_proceed == 'true'
        run: __RUN_CMD__ lint

      - name: 校验修改文件
        if: steps.precheck.outputs.should_proceed == 'true'
        id: validate
        run: |
          CHANGED_FILES=$(git diff origin/__DEFAULT_BRANCH__ HEAD --name-only)

          if [ -z "$CHANGED_FILES" ]; then
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "已修改文件："
          echo "$CHANGED_FILES"

          # 校验修改文件是否在白名单目录内（__ALLOWED_PATHS_DISPLAY__）
          INVALID_FILES=""
          while IFS= read -r file; do
            if [[ ! "$file" =~ __ALLOWED_PATHS_REGEX__ ]]; then
              INVALID_FILES="$INVALID_FILES\n$file"
            fi
          done <<< "$CHANGED_FILES"

          if [ -n "$INVALID_FILES" ]; then
            echo "::error::以下文件不在允许修改的目录内：$INVALID_FILES"
            echo "invalid_files=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "no_changes=false" >> "$GITHUB_OUTPUT"

      - name: 推送分支
        if: >-
          steps.precheck.outputs.should_proceed == 'true' &&
          steps.validate.outputs.no_changes != 'true'
        env:
          SENTINEL_PAT: ${{ secrets.SENTINEL_PAT }}
        run: git push "https://x-access-token:${SENTINEL_PAT}@github.com/${{ github.repository }}" "$BRANCH_NAME"

      - name: 清理无效分支
        if: always() && steps.validate.outputs.invalid_files == 'true'
        run: |
          git push origin --delete "$BRANCH_NAME" 2>/dev/null || true
          echo "::notice::已清理包含非法修改的远端分支：$BRANCH_NAME"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 准备 PR 正文
        id: pr_body
        if: >-
          steps.precheck.outputs.should_proceed == 'true' &&
          steps.validate.outputs.no_changes != 'true'
        run: |
          # 将 PR 正文写入文件，避免 Sentry 数据中的特殊字符引发 shell 注入
          {
            echo "## Sentry 错误 Sentinel"
            echo ""
            echo "### 错误详情"
            printf -- '- **标题:** %s\n' "$SENTRY_TITLE"
            printf -- '- **级别:** %s\n' "$SENTRY_LEVEL"
            printf -- '- **触发位置:** %s\n' "$SENTRY_CULPRIT"
            printf -- '- **Sentry 链接:** %s\n' "$SENTRY_URL"
            echo ""
            echo "### 堆栈信息"
            echo '```'
            printf '%s\n' "$SENTRY_STACKTRACE"
            echo '```'
            echo ""
            echo "### 改动说明"
            echo "本 PR 由 AI Sentinel 自动生成，用于修复上述 Sentry 生产错误。"
            echo ""
            echo "### 审查清单"
            echo "- [ ] 修复针对根本原因，而非症状"
            echo "- [ ] 无意外副作用"
            echo "- [ ] 本地测试通过"
            echo "- [ ] 错误可复现且修复已验证"
            echo ""
            echo "---"
            echo "🤖 由 AI Sentinel（Sentry）自动生成"
          } > /tmp/pr-body.md

      - name: 创建 PR
        id: create_pr
        if: >-
          steps.precheck.outputs.should_proceed == 'true' &&
          steps.validate.outputs.no_changes != 'true'
        run: |
          # 使用 --body-file 传递 PR 正文，避免 shell 注入风险
          PR_URL=$(gh pr create \
            --head "$BRANCH_NAME" \
            --base "__DEFAULT_BRANCH__" \
            --title "fix: Sentry error - ${SAFE_KEY}" \
            --body-file /tmp/pr-body.md \
            --label "sentinel,sentry" \
            __REVIEWER_FLAG__)

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 执行失败时创建 Issue
        if: failure()
        run: |
          {
            echo "## Sentry 自动修复失败"
            echo ""
            echo "针对以下 Sentry 错误的自动修复未能完成。"
            echo ""
            printf -- '**错误:** %s\n' "$SENTRY_TITLE"
            printf -- '**触发位置:** %s\n' "$SENTRY_CULPRIT"
            printf -- '**Sentry 链接:** %s\n' "$SENTRY_URL"
            echo ""
            echo "### 需要人工处理"
            echo "请人工排查并修复。"
            echo ""
            echo "### Workflow 运行详情"
            echo "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo "---"
            echo "🤖 由 AI Sentinel 自动创建"
          } > /tmp/issue-body.md

          gh issue create \
            --title "🚨 Sentinel Sentry 自动修复失败 - ${SAFE_KEY}" \
            --body-file /tmp/issue-body.md \
            --label "bug,sentinel"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
